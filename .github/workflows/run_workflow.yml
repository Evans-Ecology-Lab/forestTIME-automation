on:
  schedule:
    - cron: 0 0 1 * * # midnight on 1st of month
  workflow_dispatch: 
    inputs:
      release:
        description: "Make a new GitHub/Zenodo release with this run?"
        required: true
        type: boolean

name: run_workflow.yml

jobs:
  turn_on_self_hosted:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: check directory contents
        run: ls -rtlha
      - name: install openstack
        run: pip install python-openstackclient
      - run: |
            mkdir -p ~/.config/openstack
            echo "$OPENSTACK_CLOUD" > ~/.config/openstack/clouds.yaml
        env:
          OPENSTACK_CLOUD: ${{ secrets.OPENSTACK_CLOUD}}
      - run: openstack --os-cloud=$CLOUD_NAME server list 
        env:
          CLOUD_NAME: ${{secrets.CLOUD_NAME}}
          OPENSTACK_CLOUD: ${{ secrets.OPENSTACK_CLOUD}}
      - run: |
            python3 - << EOF
            import openstack
            import os

            cloud_env_name = os.environ["CLOUD_NAME"] 
            # Initialize connection from a clouds.yaml by passing a cloud name
            conn = openstack.connect(cloud=cloud_env_name)
            print("con", conn)
            server_id =""
            for server in conn.compute.servers():
                print(server)
                if server.name =="actions-runner":
                    if server.status =="SHELVED_OFFLOADED":
                        server.unshelve(conn.compute)
                        # use the built in wait for server
                        conn.compute.wait_for_server(server,"ACTIVE",wait=5*60)
                        print("we have reached unshelved complete")
                    break
            EOF
        env:
          CLOUD_NAME: ${{secrets.CLOUD_NAME}}

  states:
    needs: turn_on_self_hosted
    timeout-minutes: 2160
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        state: ["GA", "MI",]

        #year_var: ["INVYR","MEASYEAR"]
        year_var: ["MEASYEAR"]
      # state: ["AL", "AZ", "AR", "CA", "CO", "CT", "DE", "FL", "GA", "ID", "IL", "IN", "IA", "KS", "KY", "LA", "ME", "MD", "MA", "MI", "MN", "MS", "MO", "MT", "NE", "NV", "NH", "NJ", "NM", "NY", "NC", "ND", "OH", "OK", "OR", "PA", "RI", "SC", "SD", "TN", "TX", "UT", "VT", "VA", "WA", "WV", "WI", "WY"]
    container:
      image: ghcr.io/devinbayly/foresttime-hpc:latest
    steps:
      - uses: actions/checkout@v4
      - name: check directory contents
        run: ls -rtlha
      - name: install forestTIME
        run: R -e "pak::pak('Evans-Ecology-Lab/forestTIME#231')"
      - name: Generate state parquet
        run: Rscript state-parquet-v2.R
        env:
          STATE: ${{ matrix.state }}
          YEAR_VAR: ${{ matrix.year_var }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.state }}_${{ matrix.year_var}}
          path: fia/parquet/*

  release:
  # only happens if schedule or workflow_dispatch with release=TRUE
    if: ${{ (inputs.release && github.event_name == 'workflow_dispatch') || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    needs: states
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: "fia/parquet"
          merge-multiple: true

      - name: Total release size
        run: du -hs fia/parquet

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::purrr
            any::fs
            any::jsonlite

      - name: Create new version and upload to Zenodo
        run: Rscript zenodo-api.R
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
  turn_off_self_hosted:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: check directory contents
        run: ls -rtlha
      - name: install openstack
        run: pip install python-openstackclient
      - run: |
            mkdir -p ~/.config/openstack
            echo "$OPENSTACK_CLOUD" > ~/.config/openstack/clouds.yaml
        env:
          OPENSTACK_CLOUD: ${{ secrets.OPENSTACK_CLOUD}}
      - run: openstack --os-cloud=$CLOUD_NAME server list 
        env:
          CLOUD_NAME: ${{secrets.CLOUD_NAME}}
          OPENSTACK_CLOUD: ${{ secrets.OPENSTACK_CLOUD}}
      - run: |
            python3 - << EOF
            import openstack
            import os

            cloud_env_name = os.environ["CLOUD_NAME"] 
            # Initialize connection from a clouds.yaml by passing a cloud name
            conn = openstack.connect(cloud=cloud_env_name)
            print("con", conn)
            server_id =""
            for server in conn.compute.servers():
                print(server)
                if server.name =="actions-runner":
                    if server.status =="ACTIVE":
                        server.shelve(conn.compute)
                        # use the built in wait for server
                        conn.compute.wait_for_server(server,"SHELVED_OFFLOADED",wait=5*60)
                        print("we have reached unshelved complete")
                    break
            EOF
        env:
          CLOUD_NAME: ${{secrets.CLOUD_NAME}}